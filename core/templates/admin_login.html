<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — ITF Манас</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --red: #CC0000; --yellow: #FFD700; --black: #0A0A0A;
            --dark: #111111; --dark2: #1A1A1A; --text-light: #CCCCCC;
        }
        body {
            font-family: 'Roboto', sans-serif;
            background: var(--black);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: var(--dark2);
            border: 1px solid rgba(204,0,0,0.4);
            border-top: 3px solid var(--red);
            padding: 52px 44px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .logo { font-family: 'Oswald', sans-serif; font-size: 1rem; color: var(--yellow); letter-spacing: 3px; margin-bottom: 8px; }
        .title { font-family: 'Oswald', sans-serif; font-size: 1.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 6px; }
        .sub { color: #666; font-size: 0.82rem; margin-bottom: 36px; }
        label { display: block; text-align: left; font-size: 0.75rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        input[type="password"] {
            width: 100%; background: #111;
            border: 1px solid rgba(204,0,0,0.3);
            color: #fff; font-size: 1.3rem;
            padding: 13px 16px; letter-spacing: 5px;
            outline: none; margin-bottom: 8px;
            transition: border-color 0.3s;
            font-family: 'Roboto', sans-serif;
        }
        input[type="password"]:focus { border-color: var(--red); }
        .error { color: #ff5555; font-size: 0.82rem; min-height: 20px; margin-bottom: 14px; text-align: left; }
        .btn-login {
            width: 100%; background: var(--red); color: #fff;
            border: none; cursor: pointer;
            font-family: 'Oswald', sans-serif; font-size: 1rem;
            letter-spacing: 2px; text-transform: uppercase;
            padding: 15px;
            clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
            transition: background 0.3s;
        }
        .btn-login:hover { background: #aa0000; }
        .back { display: inline-block; margin-top: 18px; color: #555; font-size: 0.82rem; text-decoration: none; transition: color 0.2s; }
        .back:hover { color: var(--yellow); }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">⚡ ITF МАНАС</div>
        <div class="title">Панель<br>Администратора</div>
        <p class="sub">Введите пароль для входа</p>

        <form method="post">
            {% csrf_token %}
            <label>Пароль</label>
            <input type="password" name="password" placeholder="••••••" autofocus>
            <div class="error">{{ error }}</div>
            <button type="submit" class="btn-login">Войти</button>
        </form>
        <a href="/" class="back">← На главную</a>
    </div>
</body>
</html>
